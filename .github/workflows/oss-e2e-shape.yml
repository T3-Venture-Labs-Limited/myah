name: OSS E2E Shape

# ADVISORY gate that boots the full OSS stack on every PR/master push and
# asserts the welcome-screen → providers → chat path returns valid shapes.
#
# Why this exists: the OSS variant shares platform-router code paths with
# hosted (web_call_or_raise → dashboard) but runs against a different
# topology (two Hermes processes on the host instead of a per-user
# container). A platform-level test like backend-curated cannot detect
# regressions where the new code path expects hosted-only state or where
# the dashboard plugin shim drifts from the platform's call sites.
#
# This job catches the class of silent OSS regression by running the
# whole topology in CI — hermes gateway + hermes dashboard + platform
# docker container — and curling the same endpoints the welcome screen
# would hit on a real user's machine.
#
# Soak status: ADVISORY (continue-on-error: true). Per AGENTS.md's
# documented advisory→required promotion playbook, new gates land
# advisory and get promoted to required after ≥3 reliably-green runs.
# Once that bar is met, delete the `continue-on-error: true` line on
# the job AND flip the AGENTS.md row from Advisory to Required.
#
# REQUIRED SECRETS:
# - E2E_OPENROUTER_KEY: small-cap OpenRouter API key (≈$5 cap is plenty;
#   each run uses <$0.01). Configures the catalog probe to find at least
#   one provider.
#
# The myah-hermes-plugin repo is public; the install URL works
# unauthenticated. No plugin-install secret needed.

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  oss-e2e-shape:
    name: OSS welcome → providers → chat
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Advisory during soak period — fails don't block merge. See header.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install hermes-agent + myah-hermes-plugin
        run: |
          set -e
          python -m venv /tmp/hermes-venv
          /tmp/hermes-venv/bin/pip install --upgrade pip
          # Resolve both SHAs from versions.env (public-mirror single source
          # of truth; the private monorepo equivalent lives in
          # agent/Dockerfile.stock).
          # shellcheck source=/dev/null
          source ./versions.env
          if [[ -z "${HERMES_SHA:-}" || -z "${MYAH_PLUGIN_SHA:-}" ]]; then
            echo "✗ HERMES_SHA or MYAH_PLUGIN_SHA missing from versions.env" >&2
            exit 1
          fi
          # Install upstream hermes-agent at the pinned SHA.
          /tmp/hermes-venv/bin/pip install "hermes-agent @ git+https://github.com/NousResearch/Hermes-Agent@${HERMES_SHA}"
          # Install the Myah plugin from its public GitHub repo at the
          # pinned SHA. No auth needed — the repo is public.
          /tmp/hermes-venv/bin/pip install \
            "myah-hermes-plugin @ git+https://github.com/T3-Venture-Labs-Limited/myah-hermes-plugin@${MYAH_PLUGIN_SHA}"
          echo "/tmp/hermes-venv/bin" >> $GITHUB_PATH

      - name: Materialize Myah dashboard shim
        env:
          HERMES_HOME: /tmp/hermes-home
        run: |
          mkdir -p $HERMES_HOME/plugins
          myah-hermes-plugin install --dashboard-only --target $HERMES_HOME/plugins/

      - name: Seed Myah OSS .env files
        env:
          HERMES_HOME: /tmp/hermes-home
          SETUP_SERVICE_CHOICE: none
          # Tell setup-myah-oss.sh's detect_hermes_venv where we installed
          # hermes-agent. Without this override the script's default
          # candidates ($HOME/.hermes/hermes-agent/venv, etc.) wouldn't
          # match /tmp/hermes-venv and §5 would exit 1.
          MYAH_HERMES_VENV: /tmp/hermes-venv
        run: |
          ./scripts/setup-myah-oss.sh
          # Seed an OpenRouter key so the catalog probe finds at least
          # one provider. secrets.E2E_OPENROUTER_KEY must exist in the
          # repo's GitHub Actions secrets (Settings → Secrets and
          # variables → Actions → New repository secret). Use an
          # OpenRouter API key with a small credit cap (~$5 is plenty —
          # each CI run consumes <$0.01).
          echo "OPENROUTER_API_KEY=${{ secrets.E2E_OPENROUTER_KEY }}" >> $HERMES_HOME/.env

      - name: Start Hermes gateway + dashboard
        env:
          HERMES_HOME: /tmp/hermes-home
        run: |
          ./scripts/dev-oss.sh gateway start
          ./scripts/dev-oss.sh dashboard start
          # Both bind their ports within ~3s on idle CI runners; give 10s.
          sleep 10
          ./scripts/dev-oss.sh status

      - name: Boot platform via docker compose
        run: |
          # docker compose auto-reads ./.env at the project root; that's
          # where setup-myah-oss.sh wrote MYAH_AGENT_BEARER_TOKEN +
          # MYAH_HERMES_WEB_SESSION_TOKEN, so the platform container
          # gets both tokens via the env_file directive at
          # docker-compose.yml:73.
          docker compose up -d
          # Health gate: poll /api/v1/oss/probe until 200.
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8080/api/v1/oss/probe >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done

      - name: Assert probe shape
        run: |
          curl -fsS http://localhost:8080/api/v1/oss/probe | tee /tmp/probe.json
          python -c '
          import json, sys
          p = json.load(open("/tmp/probe.json"))
          assert p["hermes_reachable"] is True, f"hermes not reachable: {p}"
          assert p["plugin_installed"] is True, f"plugin missing: {p}"
          assert p["dashboard_running"] is True, f"dashboard down: {p}"
          assert "openrouter" in p["providers_configured"], f"openrouter not in providers: {p}"
          '

      - name: Assert provider catalog endpoint reachable (auth-tolerant)
        run: |
          # The endpoint is gated by get_verified_user. In OSS single-user
          # mode, an authenticated cookie/Bearer would be required to get
          # the full catalog. Without auth, a 401 is the CORRECT response
          # (the platform IS up; we just didn't send a token). Treat 200
          # OR 401 as "platform reachable, endpoint exists".
          STATUS=$(curl -s -o /tmp/catalog.json -w '%{http_code}' \
            http://localhost:8080/api/v1/providers/catalog)
          if [[ "$STATUS" != "200" && "$STATUS" != "401" ]]; then
            echo "✗ /api/v1/providers/catalog returned unexpected status: $STATUS" >&2
            head -c 500 /tmp/catalog.json >&2
            exit 1
          fi
          echo "✓ /api/v1/providers/catalog reachable (HTTP $STATUS)"

      - name: Tear down
        if: always()
        run: |
          docker compose down --volumes || true
          ./scripts/dev-oss.sh down || true
