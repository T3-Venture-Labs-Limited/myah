name: Publish OSS Image to GHCR

# Builds the Myah OSS platform image and pushes it to
# ghcr.io/t3-venture-labs-limited/myah-platform-oss.
#
# Triggers:
#   - workflow_dispatch: manual one-off publish (use for first launch + ad-hoc rebuilds)
#   - tag push (v*.*.*): semver-tagged release builds
#   - push to master: latest-from-trunk (writes ':edge' tag only — does NOT touch ':latest')
#
# The first run will create the GHCR package as PRIVATE by default
# (GHCR's policy: new packages inherit the repo's visibility, which is
# already PUBLIC — but the package itself defaults to private until
# explicitly flipped). After the first successful push:
#
#   gh api -X PATCH /orgs/T3-Venture-Labs-Limited/packages/container/myah-platform-oss \
#     -f visibility=public
#
# Or via the GitHub UI: Org → Packages → myah-platform-oss → Settings →
# Change visibility → Public.
#
# Image tags pushed (depending on trigger):
#   :sha-<short-sha>            — every build, immutable
#   :edge                       — every master push (overwritten each run)
#   :latest                     — workflow_dispatch + tag push
#   :<version>                  — tag push (e.g. :0.1.0-beta.1)
#   :<major>.<minor>            — tag push (e.g. :0.1)
#   :<major>                    — tag push (e.g. :0) — only for non-prerelease
#
# To pin in docker-compose.yml:
#   MYAH_PLATFORM_IMAGE=ghcr.io/t3-venture-labs-limited/myah-platform-oss:0.1.0-beta.1

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Extra tag to apply (e.g. 0.1.0-beta.1). Leave blank for :latest only.'
        required: false
        default: ''
  push:
    branches:
      - master
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: t3-venture-labs-limited/myah-platform-oss

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Every build: immutable SHA tag
            type=sha,prefix=sha-,format=short
            # Master push: 'edge' tag (separate from :latest so trunk doesn't clobber releases)
            type=raw,value=edge,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
            # workflow_dispatch + tag push: :latest
            type=raw,value=latest,enable=${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') }}
            # Tag push: semver
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}},enable=${{ !contains(github.ref, '-') }}
            # workflow_dispatch with extra tag input
            type=raw,value=${{ inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' && inputs.tag != '' }}
          labels: |
            org.opencontainers.image.title=Myah OSS Platform
            org.opencontainers.image.description=Self-hostable chat platform for Hermes Agent — single-user OSS variant
            org.opencontainers.image.source=https://github.com/T3-Venture-Labs-Limited/myah
            org.opencontainers.image.licenses=AGPL-3.0-or-later

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Bake PUBLIC_DEPLOYMENT_MODE=oss so the SvelteKit build gates
          # the OSS state machine correctly. See
          # docs/gotchas/2026-05-17-oss-public-deployment-mode-not-baked.md
          build-args: |
            PUBLIC_DEPLOYMENT_MODE=oss
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          {
            echo "## Image pushed"
            echo
            echo "**Tags:**"
            echo '```'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
            echo
            echo "**Pull command:**"
            echo '```'
            echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-$(git rev-parse --short HEAD)"
            echo '```'
            echo
            echo "**Pin in docker-compose.yml:**"
            echo '```'
            echo 'export MYAH_PLATFORM_IMAGE='"${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"':latest'
            echo 'docker compose up -d'
            echo '```'
            echo
            echo "**If this is the first push:** flip the package visibility to PUBLIC at"
            echo "https://github.com/orgs/T3-Venture-Labs-Limited/packages/container/myah-platform-oss/settings"
          } >> $GITHUB_STEP_SUMMARY
