# Myah OSS вҖ” single-tenant docker-compose for self-hosted installs.
#
# This is the OSS-canonical compose file. It ships at the root of the
# public T3-Venture-Labs-Limited/myah repo (via the platform-oss/ вҶ’
# repo-root subtree extraction). Hosted's parallel root-level
# docker-compose.yml exists for hosted-side development convenience вҖ”
# the two files differ only in their build context (this one uses
# ``.`` because we're already inside ``platform-oss/``; hosted's uses
# ``platform-oss`` because we're one level above).
#
# Bring-your-own-Hermes constraint: this stack does NOT bundle the
# Hermes agent. The user installs Hermes on the host:
#
#   curl -fsSL https://raw.githubusercontent.com/NousResearch/hermes-agent/main/scripts/install.sh | bash
#   hermes plugins install T3-Venture-Labs-Limited/myah-hermes-plugin
#   ./scripts/setup-myah-oss.sh          # generates secrets in BOTH .envs
#                                        # and enables the myah platform
#                                        # in ~/.hermes/config.yaml
#   hermes gateway run                   # or `gateway install && gateway start`
#
# Then bring up this stack:
#
#   docker compose up -d
#   open http://localhost:8080
#
# Architecture (single-user, no per-user agent containers):
#
#       в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ         в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ         в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ
#       в”Ӯ browser  в”Ӯ в—Җв”Җв”Җв”Җв”Җв–¶  в”Ӯ  platform  в”Ӯ в—Җв”Җв”Җв”Җв”Җв–¶  в”Ӯ hermes (host) в”Ӯ
#       в”Ӯ  :8080   в”Ӯ         в”Ӯ   :8080    в”Ӯ         в”Ӯ   :8642 api  в”Ӯ
#       в”Ӯ          в”Ӯ         в”Ӯ (container)в”Ӯ         в”Ӯ   :8643 myah в”Ӯ
#       в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ         в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ         в”Ӯ   :9119 web в”Ӯ
#                                в–І                  в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ
#                                в”Ӯ
#                            host.docker.internal
#                            (or 172.17.0.1 on Linux without Docker Desktop)
#
# OSS mode is selected via MYAH_DEPLOYMENT_MODE=oss below. The platform
# skips per-user-container spawning and routes every chat/admin/proxy
# call to the single host-side hermes gateway.

services:
  platform:
    # Default: pull the published OSS image from GHCR. The ``:latest``
    # tag follows the most recent tagged release on the public repo вҖ”
    # for reproducible installs, pin a specific version, e.g.:
    #   export MYAH_PLATFORM_IMAGE=ghcr.io/t3-venture-labs-limited/myah-platform-oss:0.1.0-beta.1
    # Available tags: https://github.com/T3-Venture-Labs-Limited/myah/pkgs/container/myah-platform-oss
    #
    # To build from source instead (e.g. you've modified the code),
    # set MYAH_PLATFORM_IMAGE to a local-only tag and `docker compose build`:
    #   export MYAH_PLATFORM_IMAGE=myah/platform:dev
    #   docker compose build
    #   docker compose up -d
    image: ${MYAH_PLATFORM_IMAGE:-ghcr.io/t3-venture-labs-limited/myah-platform-oss:latest}
    build:
      # OSS root IS platform-oss/'s content (per subtree extraction),
      # so the build context is the directory next to this file. The
      # build: stanza is here for the source-modification workflow above;
      # `docker compose up` does NOT trigger a build by default when the
      # image: tag resolves on the registry.
      context: .
      dockerfile: Dockerfile
    container_name: myah-platform
    ports:
      # Bind to 127.0.0.1 only вҖ” prevents accidental LAN exposure on
      # multi-machine networks. To expose to the LAN, change to
      # ``0.0.0.0:8080:8080`` AND re-enable auth by setting
      # MYAH_AUTH=true (also strongly recommended: rotate
      # MYAH_SECRET_KEY via ``./scripts/setup-myah-oss.sh --rotate``).
      - '127.0.0.1:8080:8080'
    volumes:
      - platform_data:/app/backend/data
    env_file: .env
    environment:
      # в”Җв”Җ OSS-mode invariants вҖ” never override in .env в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      # MYAH_DEPLOYMENT_MODE=oss tells the backend to skip per-user
      # container spawning. is_oss_mode() in
      # backend/myah/utils/hermes_web.py reads this. Setting this
      # in the compose ``environment:`` block (rather than via .env)
      # makes it a hard contract вҖ” switching it would try to spawn
      # per-user agent containers (which depend on honcho/composio/
      # the hosted overlay) and immediately crash. Hardcoded.
      MYAH_DEPLOYMENT_MODE: oss
      # в”Җв”Җ OSS-mode secure default, OVERRIDABLE via .env в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      # Single-user OSS вҖ” no login screen, no sign-up. The
      # oss_seed_user Alembic migration inserts the anonymous admin
      # on first boot.
      #
      # ``${MYAH_AUTH:-false}`` вҖ” defaults to ``false`` (single-user)
      # but reads .env so users who flip the port binding to
      # 0.0.0.0:8080:8080 (LAN-exposed) can ALSO set MYAH_AUTH=true
      # in .env to actually re-enable auth. The previous hardcoded
      # ``'false'`` silently overrode .env, which meant a user could
      # think they enabled auth while still serving an open relay on
      # their LAN. See README вҶ’ Network access for the full procedure.
      MYAH_AUTH: ${MYAH_AUTH:-false}
      # Hermes-side port wiring. Defaults match the canonical
      # ``hermes gateway run`` layout:
      #   8642 вҖ” Hermes core api_server (/v1/runs, /health, /api/jobs)
      #   8643 вҖ” Myah plugin standalone runner (/myah/health, /myah/v1/*)
      #   9119 вҖ” ``hermes dashboard`` (web UI вҖ” separate process)
      # Override only if you ran hermes on non-default ports.
      MYAH_HERMES_CHAT_PORT: ${MYAH_HERMES_CHAT_PORT:-8642}
      # NOTE: this variable is being renamed to MYAH_GATEWAY_PORT to
      # match the plugin side. The old name stays as a back-compat
      # alias вҖ” see backend/myah/routers/oss.py for the resolution
      # order.
      MYAH_HERMES_GATEWAY_PORT: ${MYAH_HERMES_GATEWAY_PORT:-${MYAH_GATEWAY_PORT:-8643}}
      MYAH_HERMES_WEB_PORT: ${MYAH_HERMES_WEB_PORT:-9119}
      # _detect_agent_host() in hermes_web.py falls back to
      # ``localhost`` on misconfigured Linux. Setting host.docker.internal
      # explicitly + the extra_hosts entry below covers Linux properly.
      MYAH_AGENT_HOST: host.docker.internal
    extra_hosts:
      # Linux compatibility. Docker Desktop sets this automatically on
      # macOS and Windows. On native Linux the host's bridge gateway
      # (typically 172.17.0.1) is exposed under the ``host-gateway``
      # alias and bound to the host.docker.internal hostname so the
      # platform container can reach the host-side hermes gateway.
      - 'host.docker.internal:host-gateway'
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:8080/health']
      interval: 30s
      timeout: 10s
      retries: 3
      # Generous start_period: first boot runs Alembic migrations
      # (including oss_seed_user) and that can take 30-40s on slow
      # SD-card-backed VMs.
      start_period: 90s

volumes:
  # SQLite database, uploaded files, and cached configs. Survives
  # container restarts and image upgrades. Back up with:
  #   docker run --rm \
  #     -v myah_platform_data:/data \
  #     -v "$PWD":/backup busybox \
  #     tar czf /backup/myah-backup.tar.gz -C /data .
  platform_data:
